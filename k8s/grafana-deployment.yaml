apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: datasource-volume
              mountPath: /etc/grafana/provisioning/datasources/datasource.yml
              subPath: datasource.yml
            - name: dashboard-provider-volume
              mountPath: /etc/grafana/provisioning/dashboards/dashboard-provider.yml
              subPath: dashboard-provider.yml
            - name: dashboard-volume
              mountPath: /var/lib/grafana/dashboards/main-dashboard.json
              subPath: main-dashboard.json
      volumes:
        - name: datasource-volume
          configMap:
            name: grafana-datasource-config
        - name: dashboard-provider-volume
          configMap:
            name: grafana-dashboard-config
            items:
              - key: dashboard-provider.yml
                path: dashboard-provider.yml
        - name: dashboard-volume
          configMap:
            name: grafana-dashboard-config
            items:
              - key: main-dashboard.json
                path: main-dashboard.json
