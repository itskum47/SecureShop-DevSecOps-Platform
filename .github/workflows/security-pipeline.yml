name: Security Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: "p/default"
      - name: Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          soft_fail: true

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v3
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v3

  docker:
    runs-on: ubuntu-latest
    needs: [secret-scanning, sast]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3

      - name: Build Frontend Image
        run: docker build -t ghcr.io/${{ github.repository }}/secureshop-frontend:${{ github.sha }} ./frontend
        
      - name: Build Backend Image
        run: docker build -t ghcr.io/${{ github.repository }}/secureshop-backend:${{ github.sha }} ./backend

      - name: Run Trivy vulnerability scanner on Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository }}/secureshop-frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Run Trivy vulnerability scanner on Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository }}/secureshop-backend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Frontend Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push ghcr.io/${{ github.repository }}/secureshop-frontend:${{ github.sha }}

      - name: Push Backend Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push ghcr.io/${{ github.repository }}/secureshop-backend:${{ github.sha }}

  deploy-kind:
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1.4.0

      - name: Deploy to Kind
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          for f in k8s/*.yaml; do
            sed -i "s|\${GITHUB_REPOSITORY}|$GITHUB_REPOSITORY|g" $f
            sed -i "s|/backend:latest|/secureshop-backend:${{ github.sha }}|g" $f
            sed -i "s|/frontend:latest|/secureshop-frontend:${{ github.sha }}|g" $f
          done
          kubectl apply -f https://github.com/kubernetes/kube-state-metrics/releases/download/v2.10.0/standard/
          kubectl apply -f k8s/
          
      - name: Deploy Falco
        run: |
          helm repo add falcosecurity https://falcosecurity.github.io/charts
          helm repo update
          helm install falco falcosecurity/falco -f helm/falco-values.yaml --namespace falco --create-namespace

      - name: Wait for pods
        run: |
          kubectl wait --for=condition=ready pod --all --timeout=300s
      - name: Port Forward Frontend
        run: |
          kubectl port-forward svc/frontend-service 8080:80 &
          sleep 5

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: 'http://localhost:8080'
          fail_action: false
